name: 🧪 Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.10"

jobs:
  test:
    name: 🐍 Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for git operations

    - name: 🐍 Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: 📦 Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: 🔧 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install pytest-cov

    - name: 🧪 Run tests with coverage
      run: |
        pytest --cov=find_commits_lib --cov-report=xml --cov-report=html --cov-report=term-missing

    - name: 📊 Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  lint:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: 🔧 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: 🎨 Check code formatting with black
      run: black --check --diff .

    - name: 📋 Check import sorting with isort
      run: isort --check-only --diff .

    - name: 🔍 Lint with flake8
      run: flake8 . --count --show-source --statistics

  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: 🔧 Install tools
        run: |
          python -m pip install --upgrade pip
          pip install "safety>=3.2" "bandit[sarif]"

      - name: 📝 Ensure Safety policy (fail on High/Critical)
        run: |
          if [ ! -f .safety-policy.yml ]; then
            cat > .safety-policy.yml <<'YAML'
          fail-scan-with-exit-code:
            dependency-vulnerabilities:
              enabled: true
              fail-on-any-of:
                cvss-severity: [critical, high]
          YAML
          fi

      - name: 🔒 Run Safety (gating)
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
        run: |
          safety scan \
            --output json \
            --detailed-output \
            --policy-file .safety-policy.yml \
            > safety-report.json

      - name: 📦 Upload Safety report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safety-report
          path: safety-report.json

      - name: 🛡️ Bandit (fail on MEDIUM+/MEDIUM+)
        run: |
          bandit -q -r find_commits_lib/ \
            --severity-level medium \
            --confidence-level medium

      - name: 🛡️ Bandit (SARIF for code scanning)
        if: always()
        run: |
          bandit -r find_commits_lib/ \
            --severity-level low \
            --confidence-level low \
            -f sarif -o bandit.sarif || true

      - name: ⬆️ Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif
          category: bandit

  build:
    name: 📦 Build Package
    runs-on: ubuntu-latest
    needs: [test, lint, security]
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: 🔧 Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: 🏗️ Build package
      run: python -m build

    - name: ✅ Check package
      run: twine check dist/*

    - name: 📤 Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
